design:
  theme: classic
  page:
    size: a4
    top_margin: 0.6cm
    bottom_margin: 0.8cm
    left_margin: 1.4cm
    right_margin: 1.4cm
    show_footer: false
    show_top_note: false
  colors:
    name: rgb(51, 51, 51)
    headline: rgb(51, 51, 51)
    connections: rgb(39, 30, 200)
    section_titles: rgb(51, 51, 51)
    body: rgb(51, 51, 51)
    links: rgb(39, 30, 200)
  typography:
    font_family:
      body: Source Sans 3
      name: Source Sans 3
      headline: Source Sans 3
      connections: Source Sans 3
      section_titles: Source Sans 3
    font_size:
      body: 10pt
      name: 18pt
      headline: 13pt
      connections: 10pt
      section_titles: 16pt
    bold:
      name: true
      headline: false
      connections: false
      section_titles: true
  header:
    alignment: center
    space_below_name: 0.3cm
    space_below_headline: 0.3cm
    space_below_connections: 0.5cm
    connections:
      separator: " | "
      hyperlink: true
      show_icons: true
      display_urls_instead_of_usernames: false
  section_titles:
    type: with_partial_line
    line_thickness: 0.9pt
    space_above: 5mm
    space_below: 4mm
  sections:
    space_between_regular_entries: 0.7em
    show_time_spans_in: []
  entries:
    date_and_location_width: 5cm
    side_space: 0cm
    space_between_columns: 0.1cm
    short_second_row: false
    highlights:
      bullet: "•"
      space_left: 0.15cm
      space_above: 0.12cm
      space_between_items: 2.5mm
      space_between_bullet_and_text: 0.5em
  templates:
    single_date: "MONTH_NAME YEAR"
    education_entry:
      degree_column: null
      main_column: "[**INSTITUTION**](#)\nAREA\nSUMMARY\nHIGHLIGHTS"
    experience_entry:
      main_column: "[**COMPANY**](#)\n**POSITION**\nSUMMARY\nHIGHLIGHTS"
    normal_entry:
      main_column: "NAME\nSUMMARY\nHIGHLIGHTS"
locale:
  language: english
